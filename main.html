<!DOCTYPE html>
<html>
<head>
    <title>Nested HTML Tables</title>
</head>
<body>

<table border="1" cellpadding="5" cellspacing="0" width="100%">
    <tr>
        <td>

            <table border="1" cellpadding="5" cellspacing="0" width="100%">
                <tr>
                    <th colspan="2">Nested Table 1</th>
                </tr>
                <tr>
                    <td>Table 1 Cell 1</td>
                    <td>Table 1 Cell 2</td>
                </tr>
            </table>

        </td>

        <td>

            <table border="1" cellpadding="5" cellspacing="0" width="100%">
                <tr>
                    <th colspan="2">Nested Table 2</th>
                </tr>
                <tr>
                    <th>Column 1</th>
                    <th>Column 2</th>
                </tr>
                <tr>
                    <td>Data 1</td>
                    <td>Data 2</td>
                </tr>
            </table>

        </td>
    </tr>

    <tr>
        <td>

            <table border="1" cellpadding="5" cellspacing="0" width="100%">
                <tr>
                    <th>Nested Table 3</th>
                </tr>
                <tr>
                    <td>
                        <ul>
                            <li>List item 1</li>
                            <li>List item 2</li>
                            <li>List item 3</li>
                        </ul>
                    </td>
                </tr>
            </table>

        </td>

        <td>

            <table border="1" cellpadding="5" cellspacing="0" width="100%">
                <tr>
                    <th>Nested Table 4</th>
                </tr>
                <tr>
                    <td bgcolor="black">
                        <font color="white">HTML</font>
                    </td>
                </tr>
            </table>

        </td>
    </tr>
</table>

</body>
</html>
