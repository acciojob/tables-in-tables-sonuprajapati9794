<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nested HTML Tables</title>
    <style>
        table {
            border-collapse: collapse;
        }
        table, th, td {
            border: 1px solid black;
        }
        th, td {
            padding: 8px;
            text-align: center;
            vertical-align: top;
        }
        .black {
            background-color: black;
            color: white;
            font-weight: bold;
        }
        ul {
            margin: 5px;
            padding-left: 20px;
            text-align: left;
        }
    </style>
</head>
<body>

<table border="1" width="800">
    <tr>
        <!-- Nested Table 1 -->
        <td>
            <table border="1" width="100%">
                <tr>
                    <th colspan="2">Nested Table 1</th>
                </tr>
                <tr>
                    <td>Row 1</td>
                    <td>Row 2</td>
                </tr>
            </table>
        </td>

        <!-- Nested Table 2 -->
        <td>
            <table border="1" width="100%">
                <tr>
                    <th colspan="2">Nested Table 2</th>
                </tr>
                <tr>
                    <th>Column 1</th>
                    <th>Column 2</th>
                </tr>
                <tr>
                    <td>Data 1</td>
                    <td>Data 2</td>
                </tr>
            </table>
        </td>
    </tr>

    <tr>
        <!-- Nested Table 3 -->
        <td>
            <table border="1" width="100%">
                <tr>
                    <th>Nested Table 3</th>
                </tr>
                <tr>
                    <td>
                        <ul>
                            <li>List item 1</li>
                            <li>List item 2</li>
                            <li>List item 3</li>
                        </ul>
                    </td>
                </tr>
            </table>
        </td>

        <!-- Nested Table 4 -->
        <td>
            <table border="1" width="100%">
                <tr>
                    <th>Nested Table 4</th>
                </tr>
                <tr>
                    <td class="black">HTML</td>
                </tr>
                <tr>
                    <td>CSS</td>
                </tr>
            </table>
        </td>
    </tr>
</table>

</body>
</html>
